version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dock_prebooking_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-dock_prebooking}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: node:20-alpine
    container_name: dock_prebooking_app
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - /app/server/node_modules
      - /app/client/node_modules
    ports:
      - '${PORT:-5000}:5000'
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-dock_prebooking}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-dock_prebooking}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5000}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run install:all && npm run db:migrate && npm run build && npm start"

volumes:
  pgdata:
